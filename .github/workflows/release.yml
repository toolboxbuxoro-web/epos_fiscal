name: Release

# Триггер: push тега вида v0.1.0 → автоматическая сборка для всех платформ
# и публикация в GitHub Releases.
#
# Чтобы выпустить релиз:
#   1. Поправить version в package.json и src-tauri/tauri.conf.json
#   2. git commit + git tag v0.1.0 + git push --tags
#   3. Через ~10–15 минут в Releases появятся артефакты:
#        - EPOS_Fiscal_0.1.0_x64.dmg     (macOS Intel)
#        - EPOS_Fiscal_0.1.0_aarch64.dmg (macOS Apple Silicon)
#        - EPOS_Fiscal_0.1.0_x64-setup.exe (Windows installer)
#        - EPOS_Fiscal_0.1.0_amd64.AppImage (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install npm deps
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Подпись апдейтов (см. docs/RELEASE.md → Auto-update).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EPOS Fiscal ${{ github.ref_name }}'
          releaseBody: 'См. CHANGELOG.md'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
