name: Release

# Триггер: push тега вида v0.1.0 → автоматическая сборка для Windows и
# публикация в GitHub Releases. Время сборки ~5-7 минут.
#
# Чтобы выпустить релиз:
#   1. Поправить version в package.json и src-tauri/tauri.conf.json
#   2. git commit + git tag v0.1.0 + git push --tags
#   3. Через ~5-7 минут в Releases появится артефакт:
#        - EPOS_Fiscal_0.1.0_x64-setup.exe (Windows NSIS installer)
#
# Mac/Linux отключены ради скорости — продакшен только Windows. Если
# нужно собрать под другую платформу, см. комментарий в matrix ниже.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Только Windows — это единственная целевая платформа в проде (4
        # магазина в УЗ, все на Win). Раньше билдили ещё Mac ARM, Mac
        # Intel и Ubuntu — суммарно ~12 мин CI на каждый push тега.
        # Без них релиз готов за ~5-7 мин, что сильно ускоряет цикл
        # «правка → видеть на Win-кассе через autoupdate».
        # Если понадобится Mac/Linux — добавь обратно строки:
        #   - platform: macos-latest
        #     args: '--target aarch64-apple-darwin'
        #   - platform: macos-latest
        #     args: '--target x86_64-apple-darwin'
        #   - platform: ubuntu-22.04
        #     args: ''
        include:
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Подпись апдейтов (см. docs/RELEASE.md → Auto-update).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EPOS Fiscal ${{ github.ref_name }}'
          releaseBody: 'См. CHANGELOG.md'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
